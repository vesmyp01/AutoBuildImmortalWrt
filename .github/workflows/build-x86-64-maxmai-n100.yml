name: build-x86-64-maxmai-n100-v5-fix

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  IMMWRT_VERSION: "24.10.5"
  ROOTFS_PARTSIZE_MB: "4096"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout private overlay
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAXMAI_OVERLAY_REPO }}
          ssh-key: ${{ secrets.MAXMAI_OVERLAY_SSH_KEY }}
          path: overlay-private
          persist-credentials: false

      - name: Preflight
        run: |
          test ! -e files/etc/uci-defaults/99-custom.sh
          test -e overlay-private/files/etc/config/wireless
          grep -q "option disabled '1'" overlay-private/files/etc/config/wireless
          grep -q "config device 'br_lan'" overlay-private/files/etc/config/network
          grep -q "option name 'br-lan'" overlay-private/files/etc/config/network
          grep -q "list ports 'eth0'" overlay-private/files/etc/config/network
          grep -q "option macaddr 'e4:3a:6e:84:35:2d'" overlay-private/files/etc/config/network
          grep -q "option device 'br-lan'" overlay-private/files/etc/config/network
          ! grep -q "option ifname 'eth0'" overlay-private/files/etc/config/network
          grep -q "option device 'eth1'" overlay-private/files/etc/config/network
          grep -q "config interface 'tailscale'" overlay-private/files/etc/config/network
          grep -q "option device 'tailscale0'" overlay-private/files/etc/config/network
          grep -q "list server '1.1.1.1'" overlay-private/files/etc/config/dhcp
          ! grep -q "enable_tftp" overlay-private/files/etc/config/dhcp
          ! grep -q "dhcp_boot" overlay-private/files/etc/config/dhcp
          ! grep -q "tftp_root" overlay-private/files/etc/config/dhcp
          grep -q "option mediaurlbase '/luci-static/argon'" overlay-private/files/etc/config/luci
          grep -q "option Argon '/luci-static/argon'" overlay-private/files/etc/config/luci
          grep -q "option Aurora '/luci-static/aurora'" overlay-private/files/etc/config/luci
          ! grep -q "/luci-static/ifit" overlay-private/files/etc/config/luci
          grep -q "tailscale" overlay-private/files/etc/config/firewall
          grep -q "option global_server 'maxmai_default'" overlay-private/files/etc/config/shadowsocksr
          grep -q "config servers 'maxmai_default'" overlay-private/files/etc/config/shadowsocksr
          grep -q "list Interface 'tailscale'" overlay-private/files/etc/config/shadowsocksr
          grep -q "100.64.0.0/10" overlay-private/files/etc/config/shadowsocksr
          ! grep -q "30088" overlay-private/files/etc/config/socat
          ! grep -q "30088" overlay-private/files/etc/config/firewall
          test -e overlay-private/files/etc/config/tailscale
          test -e overlay-private/files/etc/shadow
          grep -q "luci-theme-aurora" shell/custom-packages.sh
          grep -q "tailscale" shell/custom-packages.sh
          grep -q "luci-app-momo" shell/custom-packages.sh
          grep -q "luci-app-store" shell/custom-packages.sh
          git -C overlay-private rev-parse --short HEAD

      - name: Set executable permissions
        run: chmod +x "${{ github.workspace }}/x86-64/build24-maxmai-n100.sh"

      - name: Build MaxMai N100 ImmortalWrt image
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/overlay-private:/home/build/immortalwrt/overlay-private:ro" \
            -v "${{ github.workspace }}/x86-64/imm.config:/home/build/immortalwrt/.config:ro" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build24-maxmai-n100.sh:/home/build/immortalwrt/build.sh:ro" \
            -e ROOTFS_PARTSIZE="${ROOTFS_PARTSIZE_MB}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${IMMWRT_VERSION} \
            /bin/bash /home/build/immortalwrt/build.sh

      - name: Verify output
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/bin/targets/x86/64"
          sudo chown -R "$(id -u):$(id -g)" .
          IMG="$(ls *squashfs-combined-efi.img.gz | head -n 1)"
          MANIFEST="$(ls *.manifest | head -n 1)"
          RAW_TMP="$(mktemp)"
          set +e
          gzip -dc "$IMG" > "$RAW_TMP"
          gzip_status="$?"
          set -e
          if [ "$gzip_status" -ne 0 ] && [ "$gzip_status" -ne 2 ]; then
            exit "$gzip_status"
          fi
          LOOP="$(sudo losetup --find --partscan --show "$RAW_TMP")"
          sudo partprobe "$LOOP" || true
          sleep 1
          BOOT_MNT="$(mktemp -d)"
          ROOT_MNT="$(mktemp -d)"
          cleanup_loop() {
            sudo umount "$BOOT_MNT" 2>/dev/null || true
            sudo umount "$ROOT_MNT" 2>/dev/null || true
            sudo losetup -d "$LOOP" 2>/dev/null || true
            rmdir "$BOOT_MNT" "$ROOT_MNT" 2>/dev/null || true
          }
          trap cleanup_loop EXIT
          sudo mount "${LOOP}p1" "$BOOT_MNT"
          sudo sed -i 's/^set timeout=.*/set timeout="0"/' "$BOOT_MNT/boot/grub/grub.cfg"
          grep -q 'set timeout="0"' "$BOOT_MNT/boot/grub/grub.cfg"
          grep -q 'menuentry "ImmortalWrt"' "$BOOT_MNT/boot/grub/grub.cfg"
          grep -q 'menuentry "ImmortalWrt (failsafe)"' "$BOOT_MNT/boot/grub/grub.cfg"
          sudo umount "$BOOT_MNT"
          sudo mount -o ro "${LOOP}p2" "$ROOT_MNT"
          sudo test -f "$ROOT_MNT/etc/config/dhcp"
          sudo test -f "$ROOT_MNT/etc/config/shadowsocksr"
          sudo test -f "$ROOT_MNT/etc/config/socat"
          sudo test -f "$ROOT_MNT/etc/config/tailscale"
          ! sudo grep -q "30088" "$ROOT_MNT/etc/config/socat"
          ! sudo grep -q "30088" "$ROOT_MNT/etc/config/firewall"
          ! sudo grep -q "enable_tftp" "$ROOT_MNT/etc/config/dhcp"
          sudo grep -q "option global_server 'maxmai_default'" "$ROOT_MNT/etc/config/shadowsocksr"
          sudo grep -q "list Interface 'tailscale'" "$ROOT_MNT/etc/config/shadowsocksr"
          sudo grep -q "100.64.0.0/10" "$ROOT_MNT/etc/config/shadowsocksr"
          sudo umount "$ROOT_MNT"
          sudo losetup -d "$LOOP"
          trap - EXIT
          rmdir "$BOOT_MNT" "$ROOT_MNT"
          gzip -n -9 -c "$RAW_TMP" > "${IMG}.tmp"
          mv "${IMG}.tmp" "$IMG"
          rm -f "$RAW_TMP"
          gzip -t "$IMG"
          sha256sum "$IMG" "$MANIFEST" > maxmai-n100-sha256.txt
          for pkg in wpad-openssl iw iwinfo wireless-regdb kmod-mac80211 luci-proto-wireguard wireguard-tools socat luci-app-socat ddns-go luci-app-ddns-go luci-app-ddns luci-app-lucky lucky luci-app-ssr-plus luci-theme-argon luci-app-argon-config luci-theme-aurora luci-app-aurora-config tailscale luci-app-momo momo luci-app-uninstall luci-app-partexp luci-app-watchdog luci-app-taskplan luci-app-bandix bandix luci-app-store; do
            grep -Eq "^${pkg} -" "$MANIFEST"
          done
          for pkg in luci-app-openclash luci-app-passwall2 luci-app-mosdns luci-app-zerotier luci-app-adguardhome luci-app-turboacc luci-app-nekobox luci-app-openvpn-server luci-app-gecoosac luci-app-unishare luci-app-appfilter luci-app-netwizard luci-app-tailscale; do
            ! grep -Eq "^${pkg} -" "$MANIFEST"
          done

      - name: Create build notes
        run: |
          REPO_SHA="$(git rev-parse --short HEAD)"
          OVERLAY_SHA="$(git -C overlay-private rev-parse --short HEAD)"
          cat > "${{ github.workspace }}/maxmai-n100-build-info.md" <<EOF
          ## MaxMai N100 ImmortalWrt V5-Fix Build

          - Base version: ${IMMWRT_VERSION}
          - Rootfs partsize: ${ROOTFS_PARTSIZE_MB} MB
          - Build repo commit: ${REPO_SHA}
          - Private overlay commit: ${OVERLAY_SHA}
          - Scope: wired LAN/WAN router, PPPoE, WireGuard, socat, DDNS, ddns-go, Lucky, SSR+, Tailscale, Momo, iStore
          - LuCI theme: Argon sidebar by default, Aurora installed as standby
          - Wi-Fi/AP: disabled by default; external AP remains responsible for Wi-Fi coverage
          - LAN bridge: native br-lan device, fixed MAC e4:3a:6e:84:35:2d
          - DHCP/DNS: TFTP/PXE removed; upstream DNS restored from the working OpenWrt config
          - SSR+: fixed default global_server and added Tailscale access-control scope
          - Tailscale: installed and prepared for manual login as exit node/subnet router
          - Socat: removed 30088 management-plane exposure
          - Boot: GRUB timeout is set to 0 while keeping failsafe entry
          - Excluded in this build: OpenClash, Passwall2, MosDNS, ZeroTier, Docker, OpenVPN Server, NekoBox, HomeProxy/Nikki, AdGuard Home, TurboAcc, EasyTier
          - Safety: upstream 99-custom.sh is not included
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maxmai-n100-immortalwrt-24.10.5-v5-fix
          path: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/*.manifest
            ${{ github.workspace }}/bin/targets/x86/64/maxmai-n100-sha256.txt
            ${{ github.workspace }}/maxmai-n100-build-info.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: maxmai-n100-usb2-v5-fix
          body_path: ${{ github.workspace }}/maxmai-n100-build-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/*.manifest
            ${{ github.workspace }}/bin/targets/x86/64/maxmai-n100-sha256.txt
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
